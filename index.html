<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13 Cards Best Hand Solver</title>
    <style>
        :root {
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #1f2937;
            --border: #d1d5db;
            --red-suit: #ef4444;
            --black-suit: #111827;
            --success: #10b981;
            --gold: #f59e0b;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 16px; margin: 0; max-width: 700px; margin: 0 auto; }
        h1, h2 { text-align: center; color: var(--primary); margin-bottom: 8px; }
        p.subtitle { text-align: center; color: #6b7280; font-size: 14px; margin-top: -4px; margin-bottom: 24px; }
        
        .section { background: var(--card-bg); padding: 16px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--border); }
        
        /* Card Picker Grid */
        .suit-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; justify-content: center; }
        .card-btn { 
            width: 40px; height: 56px; border: 1px solid var(--border); border-radius: 6px; 
            background: white; font-weight: bold; font-size: 16px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; transition: 0.1s;
        }
        .card-btn:hover { background: #f9fafb; }
        .card-btn.selected { background: var(--primary); color: white !important; border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2); }
        .card-red { color: var(--red-suit); }
        .card-black { color: var(--black-suit); }

        /* Actions */
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
        .count { font-weight: bold; font-size: 16px; }
        .count.ready { color: var(--success); }
        
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; }
        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-clear { background: #6b7280; }
        .btn-clear:hover { background: #4b5563; }

        /* Results */
        #results-container { display: flex; flex-direction: column; gap: 16px; }
        .result-card { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .result-header { background: #f9fafb; padding: 10px 16px; font-weight: bold; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;}
        .hand-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); }
        .hand-row:last-child { border-bottom: none; }
        .hand-name { font-size: 12px; font-weight: bold; color: #6b7280; text-transform: uppercase; width: 60px; }
        .hand-desc { font-size: 13px; font-weight: bold; text-align: right; color: var(--primary); flex: 1; }
        .mini-cards { display: flex; gap: 4px; flex: 2; justify-content: center; }
        .mini-card { 
            width: 32px; height: 44px; border: 1px solid var(--border); border-radius: 4px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 12px; font-weight: bold; background: white;
        }

        #loading { text-align: center; font-weight: bold; color: var(--primary); display: none; padding: 20px; }
        
        .natural-banner { background: var(--gold); color: white; padding: 16px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 18px; margin-bottom: 16px; display: none; }
    </style>
</head>
<body>

    <h1>13 Cards Solver</h1>
    <p class="subtitle">Select exactly 13 cards to find the best possible valid arrangements.</p>

    <div class="section">
        <div id="deck-grid"></div>
        
        <div class="status-bar">
            <button class="btn btn-clear" onclick="clearSelection()">Clear</button>
            <div id="selection-count" class="count">0 / 13 Selected</div>
            <button id="solve-btn" class="btn btn-primary" disabled onclick="startSolving()">Find Hands</button>
        </div>
    </div>

    <div class="section" id="results-section" style="display: none;">
        <h2>Top Recommended Sets</h2>
        <div id="natural-banner" class="natural-banner"></div>
        <div id="loading">Calculating 72,072 combinations...</div>
        <div id="results-container"></div>
    </div>

    <script>
        const suits = [
            { id: 's', symbol: '♠', color: 'card-black' },
            { id: 'h', symbol: '♥', color: 'card-red' },
            { id: 'c', symbol: '♣', color: 'card-black' },
            { id: 'd', symbol: '♦', color: 'card-red' }
        ];
        const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
        const catNames = ["High Card", "Pair", "Two Pair", "Three of a Kind", "Straight", "Flush", "Full House", "Four of a Kind", "Straight Flush"];
        
        let selectedCards = [];

        // 1. UI: Build Deck Grid
        function buildDeck() {
            const grid = document.getElementById('deck-grid');
            grid.innerHTML = '';
            suits.forEach(suit => {
                const row = document.createElement('div');
                row.className = 'suit-row';
                ranks.forEach(rank => {
                    const btn = document.createElement('div');
                    btn.className = `card-btn ${suit.color}`;
                    btn.innerHTML = `<span>${rank}</span><span style="font-size:12px">${suit.symbol}</span>`;
                    btn.onclick = () => toggleCard(rank, suit, btn);
                    row.appendChild(btn);
                });
                grid.appendChild(row);
            });
        }

        function toggleCard(rank, suit, btnElement) {
            const cardId = `${rank}${suit.id}`;
            const index = selectedCards.findIndex(c => c.id === cardId);
            
            if (index > -1) {
                selectedCards.splice(index, 1);
                btnElement.classList.remove('selected');
            } else {
                if (selectedCards.length >= 13) return; // Max 13
                selectedCards.push({ 
                    id: cardId, 
                    r: getCardValue(rank), 
                    s: suit.id, 
                    symbol: suit.symbol,
                    display: rank,
                    color: suit.color
                });
                btnElement.classList.add('selected');
            }
            updateStatus();
        }

        function getCardValue(rank) {
            if (rank === 'A') return 14;
            if (rank === 'K') return 13;
            if (rank === 'Q') return 12;
            if (rank === 'J') return 11;
            if (rank === 'T') return 10;
            return parseInt(rank);
        }

        function clearSelection() {
            selectedCards = [];
            document.querySelectorAll('.card-btn').forEach(btn => btn.classList.remove('selected'));
            updateStatus();
            document.getElementById('results-section').style.display = 'none';
        }

        function updateStatus() {
            const countEl = document.getElementById('selection-count');
            const solveBtn = document.getElementById('solve-btn');
            countEl.textContent = `${selectedCards.length} / 13 Selected`;
            
            if (selectedCards.length === 13) {
                countEl.classList.add('ready');
                solveBtn.disabled = false;
            } else {
                countEl.classList.remove('ready');
                solveBtn.disabled = true;
            }
        }

        // 2. Naturals Evaluator
        function checkNaturals(cards) {
            let rankCounts = {};
            let suitCounts = { 's': 0, 'h': 0, 'c': 0, 'd': 0 };
            let colors = { black: 0, red: 0 };

            cards.forEach(c => {
                rankCounts[c.r] = (rankCounts[c.r] || 0) + 1;
                suitCounts[c.s]++;
                if (c.s === 's' || c.s === 'c') colors.black++;
                else colors.red++;
            });

            const rCounts = Object.values(rankCounts);
            const sCounts = Object.values(suitCounts).filter(v => v > 0).sort((a, b) => b - a);

            // Dragon (13 unique ranks)
            if (rCounts.length === 13) return { isNatural: true, name: "Dragon (13 Unique Cards)" };

            // All One Color
            if (colors.black === 13 || colors.red === 13) return { isNatural: true, name: "All One Color" };

            // Three Quads
            if (rCounts.filter(c => c === 4).length === 3) return { isNatural: true, name: "Three Quads" };

            // Six Pairs (4-of-a-kind counts as 2 pairs)
            let pairs = 0;
            rCounts.forEach(count => { pairs += Math.floor(count / 2); });
            if (pairs === 6) return { isNatural: true, name: "Six Pairs" };

            // Three Flushes (Suit counts must be exactly partitionable into 5, 5, 3)
            const sProfile = sCounts.join(',');
            if (['13', '10,3', '8,5', '5,5,3'].includes(sProfile)) return { isNatural: true, name: "Three Flushes" };

            return { isNatural: false };
        }

        // 3. Core Combinatorics Evaluator Logic
        function eval5(cards) {
            let counts = {};
            let suitCounts = {};
            cards.forEach(c => {
                counts[c.r] = (counts[c.r] || 0) + 1;
                suitCounts[c.s] = (suitCounts[c.s] || 0) + 1;
            });
            
            let isFlush = Object.keys(suitCounts).length === 1;
            let groups = Object.entries(counts).map(([r, c]) => ({r: Number(r), c})).sort((a,b) => b.c - a.c || b.r - a.r);
            let ranksOnly = groups.map(g => g.r);
            
            let isStraight = false;
            let straightHigh = 0;
            
            if (ranksOnly.length === 5) {
                if (ranksOnly[0] - ranksOnly[4] === 4) {
                    isStraight = true;
                    straightHigh = ranksOnly[0];
                } else if (ranksOnly.join(',') === "14,5,4,3,2") {
                    isStraight = true;
                    straightHigh = 5;
                }
            }

            let cat = 0;
            if (isStraight && isFlush) cat = 8;
            else if (groups[0].c === 4) cat = 7;
            else if (groups[0].c === 3 && groups[1].c === 2) cat = 6;
            else if (isFlush) cat = 5;
            else if (isStraight) cat = 4;
            else if (groups[0].c === 3) cat = 3;
            else if (groups[0].c === 2 && groups[1].c === 2) cat = 2;
            else if (groups[0].c === 2) cat = 1;

            let score = cat * 10000000000;
            if (cat === 4 || cat === 8) {
                score += straightHigh * 100000000;
            } else if (cat === 5 || cat === 0) {
                let sortedFlushRanks = cards.map(c=>c.r).sort((a,b)=>b-a);
                score += sortedFlushRanks[0]*100000000 + sortedFlushRanks[1]*1000000 + sortedFlushRanks[2]*10000 + sortedFlushRanks[3]*100 + sortedFlushRanks[4];
            } else {
                let multis = [100000000, 1000000, 10000, 100, 1];
                for(let i=0; i<groups.length; i++){
                    score += groups[i].r * multis[i];
                }
            }
            return { score, cat, name: catNames[cat] };
        }

        function eval3(cards) {
            let counts = {};
            cards.forEach(c => {
                counts[c.r] = (counts[c.r] || 0) + 1;
            });
            let groups = Object.entries(counts).map(([r, c]) => ({r: Number(r), c})).sort((a,b) => b.c - a.c || b.r - a.r);
            
            let cat = 0;
            if (groups[0].c === 3) cat = 3;
            else if (groups[0].c === 2) cat = 1;
            
            let score = cat * 10000000000;
            let multis = [100000000, 1000000, 10000];
            for(let i=0; i<groups.length; i++){
                score += groups[i].r * multis[i];
            }
            return { score, cat, name: catNames[cat] };
        }

        function getCombinations(array, k) {
            const results = [];
            function helper(start, combo) {
                if (combo.length === k) {
                    results.push([...combo]);
                    return;
                }
                for (let i = start; i < array.length; i++) {
                    combo.push(array[i]);
                    helper(i + 1, combo);
                    combo.pop();
                }
            }
            helper(0, []);
            return results;
        }

        // 4. Solving Execution
        function startSolving() {
            document.getElementById('results-section').style.display = 'block';
            document.getElementById('results-container').innerHTML = '';
            document.getElementById('natural-banner').style.display = 'none';
            document.getElementById('solve-btn').disabled = true;
            
            // 1. Check for Naturals First
            const naturalStatus = checkNaturals(selectedCards);
            if (naturalStatus.isNatural) {
                const banner = document.getElementById('natural-banner');
                banner.textContent = `🏆 Instant Win Detected: ${naturalStatus.name}! 🏆`;
                banner.style.display = 'block';
                document.getElementById('solve-btn').disabled = false;
                
                // Show raw hand, skip permutations
                renderResults([{
                    front: sortForDisplay(selectedCards.slice(0,3)),
                    mid: sortForDisplay(selectedCards.slice(3,8)),
                    back: sortForDisplay(selectedCards.slice(8,13)),
                    frontEval: {name: "Any"}, midEval: {name: "Any"}, backEval: {name: "Any"}
                }], true);
                
                return;
            }

            // 2. Normal Hand Solving
            document.getElementById('loading').style.display = 'block';
            
            setTimeout(() => {
                const results = solveHands(selectedCards);
                renderResults(results, false);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('solve-btn').disabled = false;
            }, 100);
        }

        function solveHands(cards) {
            let validHands = [];
            
            let backCombs = getCombinations(cards, 5);
            for(let i=0; i<backCombs.length; i++) {
                let back = backCombs[i];
                let backEval = eval5(back);
                
                let rem8 = cards.filter(c => !back.includes(c));
                let midCombs = getCombinations(rem8, 5);
                
                for(let j=0; j<midCombs.length; j++) {
                    let mid = midCombs[j];
                    let midEval = eval5(mid);
                    
                    if(midEval.score > backEval.score) continue; 
                    
                    let front = rem8.filter(c => !mid.includes(c));
                    let frontEval = eval3(front);
                    
                    if(frontEval.score > midEval.score) continue; 
                    
                    validHands.push({
                        front: sortForDisplay(front), mid: sortForDisplay(mid), back: sortForDisplay(back),
                        frontEval, midEval, backEval,
                        tierSum: (backEval.cat * 2) + (midEval.cat * 2) + (frontEval.cat * 3) 
                    });
                }
            }
            
            validHands.sort((a,b) => {
                if (b.tierSum !== a.tierSum) return b.tierSum - a.tierSum;
                if (b.frontEval.score !== a.frontEval.score) return b.frontEval.score - a.frontEval.score;
                if (b.midEval.score !== a.midEval.score) return b.midEval.score - a.midEval.score;
                return b.backEval.score - a.backEval.score;
            });
            
            return validHands.slice(0, 5);
        }

        function sortForDisplay(cards) {
            return [...cards].sort((a,b) => b.r - a.r);
        }

        // 5. Rendering
        function renderResults(results, isNatural) {
            const container = document.getElementById('results-container');
            container.innerHTML = '';
            
            if (results.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:red; font-weight:bold;">No valid combinations found (Foul Hand)!</p>';
                return;
            }

            results.forEach((res, index) => {
                const headerText = isNatural ? "Unsorted Cards (Natural Hand)" : `Option ${index + 1}`;
                const html = `
                    <div class="result-card">
                        <div class="result-header">
                            <span>${headerText}</span>
                        </div>
                        <div class="hand-row">
                            <span class="hand-name">Front</span>
                            <div class="mini-cards">${renderMiniCards(res.front)}</div>
                            <span class="hand-desc">${res.frontEval.name}</span>
                        </div>
                        <div class="hand-row">
                            <span class="hand-name">Middle</span>
                            <div class="mini-cards">${renderMiniCards(res.mid)}</div>
                            <span class="hand-desc">${res.midEval.name}</span>
                        </div>
                        <div class="hand-row">
                            <span class="hand-name">Back</span>
                            <div class="mini-cards">${renderMiniCards(res.back)}</div>
                            <span class="hand-desc">${res.backEval.name}</span>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function renderMiniCards(cards) {
            return cards.map(c => `
                <div class="mini-card ${c.color}">
                    <span>${c.display}</span>
                    <span style="font-size:10px">${c.symbol}</span>
                </div>
            `).join('');
        }

        // Init
        buildDeck();
    </script>
</body>
</html>
